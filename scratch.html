}
.blocklyDropdownText {
  fill: rgb(255, 255, 255) !important;
}

.blocklyEditableText > .blocklyText:not(.blocklyDropdownText),
.blocklyFlyoutButton > .blocklyText {
  text-shadow: none;
}

.blocklyNonEditableText > text, .blocklyEditableText > text {
  fill: rgb(87, 94, 117);
}
.scratchCommentForeignObject {
  background-color: #fff9d9;
}
.scratchCommentTextarea {
  color: #a9983e;
  background-color: #fff9d9;
  width: 100%;
  height: 100%;
  padding: 12px;
  box-sizing: border-box;
}

.scratchCommentText {
  font-size: 16px;
  fill: #fff9d9;
  font-family: "Helvetica Neue", Helvetica, sans-serif;
}
.scratchCommentBody {
  background-color: #fff9d9; }
.scratchCommentTopBar {
  fill: #fff2ae;
  fill-opacity: 0.1}
.scratchCommentRect {
  fill: #fff2ae; }
.scratchWorkspaceCommentBorder {
  stroke: #fff2ae; }
.scratchCommentTopBar ~ use, .scratchCommentTopBar ~ image {
  opacity: 0.4; }
.scratchCommentTarget {
  display: none;
}
.scratchCommentResizeSE, .scratchCommentResizeSW {
  fill: transparent;
}
.blocklyResizeLine {
  stroke: #888;
  stroke-width: 1;
}
@import '~#root/lls/styles/index.scss';

g[data-category^='doodle'] > path {
  fill: white;
  stroke-width: 2;
  stroke-dasharray: 6;
}
g[data-category^='doodle-'] > .blocklyText {
  /*
   * The doodle block label is padded with dots to make it longer.
   * clip-path makes the dots invisible.
   */
  clip-path: inset(0 4px 0 4px);
  text-shadow: none !important;
  fill: $color-grey-10;
}

g[data-category='doodle-any'] > .blocklyText {
  fill: white;
}

  <script>
 console.log('hello SVG World!');

 let mySvg = document.querySelector('svg');
 let x=0, y=0

  mySvg.addEventListener('mousemove', 
    ////--------------------------------------------------------
       e => {
              r = e.currentTarget.getBoundingClientRect();
               x = ((e.clientX - r.left) / r.width  * 100).toFixed(1) + '%';
               y = ((e.clientY - r.top)  / r.height * 100).toFixed(1) + '%';
//               e.currentTarget.style.setProperty('--mx', x);
//               e.currentTarget.style.setProperty('--my', y);
            });


    function onMouseStop(element, callback, delay = 300) {
     let timer;
      element.addEventListener('mousemove', 
         ////---------------------------------------
         e => {
               clearTimeout(timer);
                timer = setTimeout( () => callback(e), delay);
              });
    }
// Usage:
onMouseStop(mySvg, e => {
                         mySvg.style.setProperty('--mx', x);
                         mySvg.style.setProperty('--my', y);
                        }, 10);
          
  </script>
